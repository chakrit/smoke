- name: test/jsontests.json \ Echo
  commands:
    - command: echo json-driven smoke test
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - json-driven smoke test
- name: test/jsontests.json \ Arithmetic
  commands:
    - command: echo $((6 * 7))
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - "42"
