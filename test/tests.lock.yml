            - "127"
        - name: stdout
          data:
            - ""
        - name: stderr
          data:
            - '/bin/sh: line 1: unknowncommand_asdfqwerzcxv: command not found'
- name: test/tests.yml \ Behavior \ File checks
  commands:
    - command: ls
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - funcs.go
            - print.go
        - name: stderr
          data:
            - ""
        - name: exitcode
          data:
            - "0"
        - name: ./internal/p/*.go
          data:
            - '-----BEGIN funcs.go-----'
            - package p
            - ""
            - import (
            - "\t\"fmt\""
            - "\t\"os\""
            - "\t\"strings\""
            - ""
            - "\t\"github.com/chakrit/smoke/checks\""
            - "\t\"github.com/chakrit/smoke/engine\""
            - "\t\"github.com/chakrit/smoke/resultspecs\""
            - )
            - ""
            - // Exit codes — frozen contract, see docs/spec/exit-codes.md.
            - const (
            - "\tExitUnchanged = 0  // output matched the lock"
            - "\tExitChanged   = 1  // drift detected"
            - "\tExitTrouble   = 2  // operational error (runner crash, I/O)"
            - "\tExitNew       = 3  // no lock; first run unreviewed"
            - "\tExitUsage     = 64 // invalid invocation (EX_USAGE)"
            - "\tExitDataErr   = 65 // spec or lock file read but malformed (EX_DATAERR)"
            - )
            - ""
            - // utility CLI logs
            - func Usage(s string)  { fmt.Fprintln(os.Stderr, s) }
            - func Bye()            { output(2, cLowkey+"exited."+cReset) }
            - func Error(err error) { outputErr(-1, cError+"ERR "+err.Error()+cReset) }
            - func Action(s string) { output(1, cAction+"≋≋> "+strings.ToUpper(s)+cReset) }
            - ""
            - func Exit(err error) {
            - "\tError(err)"
            - "\tos.Exit(ExitTrouble)"
            - '}'
            - ""
            - // DataErr exits when a spec or lock file is read but won't parse or validate —
            - // malformed input, distinct from operational trouble. See exit-codes.md.
            - func DataErr(err error) {
            - "\tError(err)"
            - "\tos.Exit(ExitDataErr)"
            - '}'
            - ""
            - // testing flow
            - func Test(t *engine.Test)                                          { output(1, cTitle+"==> "+cTitleEm+t.Name+cReset) }
            - func Command(_ *engine.Test, cmd engine.Command)                   { output(2, cSubtitle+"--> "+string(cmd)+cReset) }
            - func Check(_ *engine.Test, _ engine.Command, chk checks.Interface) { /* no-op */ }
            - ""
            - func TestResult(_ engine.TestResult, err error) {
            - "\tif err != nil {"
            - "\t\tError(err)"
            - "\t}"
            - '}'
            - ""
            - func CommandResult(result engine.CommandResult, err error) {
            - "\tif err != nil {"
            - "\t\tError(err)"
            - "\t}"
            - '}'
            - ""
            - func CheckResult(result checks.Result, err error) {
            - "\tif err != nil {"
            - "\t\tError(err)"
            - "\t\treturn"
            - "\t}"
            - ""
            - "\tlines := strings.Split(string(result.Data), \"\\n\")"
            - "\tfor _, line := range lines {"
            - "\t\toutput(3, fmt.Sprintf(\"%s  > %s:%s %s\", cLowkey, result.Check.Spec(), cReset, line))"
            - "\t}"
            - '}'
            - ""
            - // lockfile flow
            - func FileAccess(f string) { output(2, cSubtitle+"--> "+f+cReset) }
            - func Pass(s string)       { output(-1, cPass+"\n  ✔ "+s+"\n"+cReset) }
            - ""
            - // drift verdicts — neutral vocabulary, no pass/fail framing. UNCHANGED means
            - // drift-free, not verified-correct; CHANGED means review, not failure.
            - func Unchanged(lock string) {
            - "\toutput(-1, \"\\nUNCHANGED — output matches \"+lock+\" (drift-free, not verified correct)\\n\")"
            - '}'
            - func Changed(lock string) {
            - "\toutput(-1, cAction+\"\\nCHANGED — output drifted from \"+lock+\"; review and re-commit if intended\\n\"+cReset)"
            - '}'
            - func New(lock string) {
            - "\toutput(-1, cAction+\"\\nNEW — no lock at \"+lock+\"; first run unreviewed, --commit to create the golden\\n\"+cReset)"
            - '}'
            - ""
            - // diff flow
            - func TestEdit(edit resultspecs.TestEdit) {
            - "\tc, prefix := colorByAction(edit.Action)"
            - "\toutput(0, c+prefix+\" ==> \"+edit.Name+cReset)"
            - '}'
            - ""
            - func CommandEdit(edit resultspecs.CommandEdit) {
            - "\tc, prefix := colorByAction(edit.Action)"
            - "\toutput(0, c+prefix+\" --> \"+edit.Name+cReset)"
            - '}'
            - ""
            - func CheckEdit(edit resultspecs.CheckEdit) {
            - "\tc, prefix := colorByAction(edit.Action)"
            - "\toutput(0, c+prefix+\"   > \"+edit.Name+cReset)"
            - '}'
            - ""
            - func LineEdit(edit resultspecs.LineEdit) {
            - "\tc, prefix := colorByAction(edit.Action)"
            - "\toutput(0, c+prefix+\"       \"+edit.Line+cReset)"
            - '}'
            - ""
            - func colorByAction(action resultspecs.Action) (string, string) {
            - "\tswitch action {"
            - "\tcase resultspecs.NoOp:"
            - "\t\treturn cEqual, \"   \""
            - "\tcase resultspecs.Equal:"
            - "\t\treturn cEqual, \"   \""
            - "\tcase resultspecs.Added:"
            - "\t\treturn cAdded, \"+++\""
            - "\tcase resultspecs.Removed:"
            - "\t\treturn cRemoved, \"---\""
            - "\tcase resultspecs.InnerChanges:"
            - "\t\treturn cInnerChanges, \"   \""
            - "\tdefault:"
            - "\t\tpanic(\"bad edit action: \" + fmt.Sprint(action))"
            - "\t}"
            - '}'
            - '-----END funcs.go-----'
            - ""
            - '-----BEGIN print.go-----'
            - package p
            - ""
            - import (
            - "\t\"fmt\""
            - "\t\"io\""
            - "\t\"os\""
            - "\t\"time\""
            - ""
            - "\t\"github.com/mgutz/ansi\""
            - )
            - ""
            - var ( // stylesheet :p
            - "\tcTitle    string"
            - "\tcTitleEm  string"
            - "\tcSubtitle string"
            - "\tcLowkey   string"
            - "\tcReset    string"
            - ""
            - "\tcAction string"
            - "\tcError  string"
            - "\tcPass   string"
            - ""
            - "\tcEqual        string"
            - "\tcAdded        string"
            - "\tcRemoved      string"
            - "\tcInnerChanges string"
            - ""
            - "\tstartTime time.Time"
            - "\tverbosity int"
            - )
            - ""
            - func init() { Configure(true, false, 1, 0) }
            - ""
            - func Verbosity() int { return verbosity }
            - ""
            - func Configure(color, trackTime bool, v int, q int) {
            - "\tverbosity = 1 + v - q"
            - "\tif trackTime {"
            - "\t\tstartTime = time.Now()"
            - "\t}"
            - ""
            - "\tif !color {"
            - "\t\tcTitle = \"\""
            - "\t\tcTitleEm = \"\""
            - "\t\tcSubtitle = \"\""
            - "\t\tcLowkey = \"\""
            - "\t\tcReset = \"\""
            - ""
            - "\t\tcAction = \"\""
            - "\t\tcError = \"\""
            - "\t\tcPass = \"\""
            - ""
            - "\t\tcEqual = \"\""
            - "\t\tcAdded = \"\""
            - "\t\tcRemoved = \"\""
            - "\t\tcInnerChanges = \"\""
            - ""
            - "\t} else {"
            - "\t\tcTitle = ansi.Magenta"
            - "\t\tcTitleEm = ansi.ColorCode(\"magenta+b\")"
            - "\t\tcSubtitle = ansi.Blue"
            - "\t\tcLowkey = ansi.LightBlack"
            - "\t\tcReset = ansi.Reset"
            - ""
            - "\t\tcAction = ansi.ColorCode(\"cyan+b\")"
            - "\t\tcError = ansi.Red"
            - "\t\tcPass = ansi.ColorCode(\"green+b\")"
            - ""
            - "\t\tcEqual = ansi.LightBlack"
            - "\t\tcAdded = ansi.Green"
            - "\t\tcRemoved = ansi.Red"
            - "\t\tcInnerChanges = ansi.LightBlack"
            - "\t}"
            - '}'
            - ""
            - // output writes the drift/match report to stdout. outputErr routes operational
            - // diagnostics to stderr so consumers can separate "output drifted" from "SMOKE
            - // broke" by stream — see docs/spec/exit-codes.md.
            - func output(level int, s string)    { outputTo(os.Stdout, level, s) }
            - func outputErr(level int, s string) { outputTo(os.Stderr, level, s) }
            - ""
            - func outputTo(w io.Writer, level int, s string) {
            - "\tif level >= verbosity {"
            - "\t\treturn"
            - "\t}"
            - ""
            - "\tif !startTime.IsZero() {"
            - "\t\tdur := time.Since(startTime)"
            - "\t\t_, _ = fmt.Fprintf(w, \"%20s \", dur)"
            - "\t}"
            - ""
            - "\t_, _ = io.WriteString(w, s)"
            - "\t_, _ = io.WriteString(w, \"\\n\")"
            - '}'
            - '-----END print.go-----'
            - ""
