            - ""
- name: test/tests.yml \ Sanity \ Workdirs \ Reversing \ Two Dirs
  commands:
    - command: ls *.mod
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - go.mod
        - name: stderr
          data:
            - ""
- name: test/tests.yml \ Sanity \ Unit Tests
  commands:
    - command: go test -v ./...
      checks:
        - name: exitcode
          data:
            - "0"
- name: test/tests.yml \ Sanity \ Common Switches
  commands:
    - command: ./bin/smoke --time -qqqq -vvvv
      checks:
        - name: exitcode
          data:
            - "64"
- name: test/tests.yml \ Sanity \ Help
  commands:
    - command: ./bin/smoke --help
      checks:
        - name: exitcode
          data:
            - "0"
        - name: exitcode
          data:
            - "0"
        - name: stderr
          data:
            - SMOKE is a drift detector for command output, not an assertion engine.
            - A clean run means output matched the committed golden — UNCHANGED is not "correct".
            - ""
            - 'Usage:'
            - '  smoke [flags] <spec.yml>...'
            - ""
            - 'Flags:'
            - '  -c, --commit                      Commit all test output.'
            - '      --commit-last                 Commit the previous run''s results without re-running; refuses if the spec changed.'
            - '  -x, --exclude strings             Do not run tests matching the given pattern'
            - '  -h, --help                        Show help on usages.'
            - '  -i, --include strings             Only run tests matching the given pattern'
            - '      --init string[="tests.yml"]   Write a starter tests.yml file; pass a path to write elsewhere.'
            - '      --json                        Emit the compare result as a machine-readable JSON document.'
            - '  -l, --list                        List all discovered tests and exit.'
            - '      --no-color                    Turns off console coloring.'
            - '  -p, --print                       Print raw test results to stdout for scripting purposes.'
            - '  -q, --quiet count                 Decrease log output chattiness.'
            - '  -s, --show-expected               Show currently locked results without running the tests.'
            - '      --time                        Log timestamps.'
            - '  -v, --verbose count               Increase log output chattiness.'
            - ""
            - 'Exit codes:'
            - '  0   UNCHANGED   output matched the lock (not "tests passed")'
            - '  1   CHANGED     drift — output moved from the golden (includes MISSING, timeout)'
            - '  2               operational error — SMOKE itself broke (runner crash, I/O)'
            - '  3   NEW         no lock yet; first run is unreviewed'
            - '  64              usage error — invalid invocation (bad flags)'
            - '  65              data error — spec or lock file is malformed'
- name: test/tests.yml \ Sanity \ Loads
  commands:
    - command: ./bin/smoke --no-color --list test/testdata/badtests.yml
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - test/testdata/badtests.yml \ hello
            - test/testdata/badtests.yml \ lipsum \ Head
            - test/testdata/badtests.yml \ lipsum \ Tail
    - command: ./bin/smoke --no-color --list test/testdata/badtests.yml -v
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - test/testdata/badtests.yml \ hello
            - "\techo hello"
            - "\techo missing"
            - test/testdata/badtests.yml \ lipsum \ Head
            - "\thead -22 test/testdata/badtests.txt | tail -9"
            - test/testdata/badtests.yml \ lipsum \ Tail
            - "\ttail -22 test/testdata/badtests.txt | head -9"
- name: test/tests.yml \ Behavior \ Drift diff
  commands:
    - command: ./bin/smoke --no-color test/testdata/badtests.yml
      checks:
        - name: exitcode
          data:
            - "1"
        - name: stdout
          data:
            - '    ==> test/testdata/badtests.yml \ hello'
            - '--- --> echo extraneous'
            - '---   > stdout'
            - '---       extraneous'
            - +++ --> echo missing
            - +++   > stdout
            - +++       missing
            - '    ==> test/testdata/badtests.yml \ lipsum \ Head'
            - '    --> head -22 test/testdata/badtests.txt | tail -9'
            - '      > stdout'
            - '---       mixtape bushwick leggings affogato portland la croix direct trade biodiesel DIY readymade'
            - +++       fixie tousled deep v af lomo synth. Bushwick la croix ramps twee put a bird on it.
            - '          '
            - '          Man braid vinyl disrupt drinking vinegar cold-pressed knausgaard hashtag keytar pabst'
            - '           ... 3 line(s) skipped ...'
            - '          a bird on it. Ramps fanny pack humblebrag, leggings gochujang vexillologist echo park'
            - '          live-edge kitsch meditation offal hella swag lo-fi. Air plant lo-fi green juice mumblecore'
            - '---       fixie tousled deep v af lomo synth. Bushwick la croix ramps twee put a bird on it.'
            - +++       mixtape bushwick leggings affogato portland la croix direct trade biodiesel DIY readymade
            - '    ==> test/testdata/badtests.yml \ lipsum \ Tail'
            - '    --> tail -22 test/testdata/badtests.txt | head -9'
