- name: test/tests.yml \ Builds
  commands:
    - command: go build -o ./bin/smoke -v .
      checks:
        - name: exitcode
          data:
            - "0"
    - command: ./bin/smoke
      checks:
        - name: exitcode
          data:
            - "64"
- name: test/tests.yml \ Sanity \ Imports
  commands:
    - command: goimports -l *.go checks/*.go engine/*.go internal/p/*.go internal/*.go
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - ""
    - command: goimports -l testspecs/*.go resultspecs/*.go
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - resultspecs/line_edit.go
            - resultspecs/resultspecs.go
- name: test/tests.yml \ Sanity \ Workdirs \ Current dir
  commands:
    - command: ls *.mod
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - go.mod
        - name: stderr
          data:
            - ""
- name: test/tests.yml \ Sanity \ Workdirs \ One Dir
  commands:
