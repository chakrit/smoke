---
config:
  interpreter: /bin/sh
  timeout: 5s
tests:
  - name: Builds
    checks:
      - exitcode
    commands:
      - go build -o ./bin/smoke -v .
      - ./bin/smoke
  - name: Sanity
    checks:
      - exitcode
    tests:
      - name: Imports
        checks:
          - stdout
        commands:
          - goimports -l *.go checks/*.go engine/*.go internal/p/*.go internal/*.go
          - goimports -l testspecs/*.go resultspecs/*.go
      - name: Workdirs
        checks:
          - stdout
          - stderr
        tests:
          - name: Current dir
            commands:
              - ls *.mod
          - name: One Dir
            config:
              workdir: ./bin
            commands:
              - ls ../*.mod
          - name: Two Dirs
            config:
              workdir: ./internal/p
            commands:
              - ls ../../*.mod
          - name: Reversing
            config:
              workdir: ./internal/p
            tests:
              - name: One Dir
                config:
                  workdir: ..
                commands:
                  - ls ../*.mod
              - name: Two Dirs
                config:
                  workdir: ../..
                commands:
                  - ls *.mod
      - name: Unit Tests
        commands:
          - go test -v ./...
      - name: Common Switches
        commands:
          - ./bin/smoke --time -qqqq -vvvv
      - name: Help
        checks:
          - exitcode
          - stderr
        commands:
          - ./bin/smoke --help
      - name: Loads
        checks:
          - stdout
        commands:
          - ./bin/smoke --no-color --list tests.yml
          - ./bin/smoke --no-color --list tests.yml -v
  - name: Behavior
    checks:
      - exitcode
      - stdout
      - stderr
    tests:
      - name: Drift diff
        commands:
          - ./bin/smoke --no-color test/testdata/badtests.yml
      - name: Command error
        commands:
          - unknowncommand_asdfqwerzcxv # should error
      - name: File checks
        config:
          workdir: ./internal/p
        checks:
          - exitcode
          - ./internal/p/*.go # should collect *.go contents into lockfile
        commands:
          - ls # should list the files in internal/p
      - name: Env
        config:
          env:
            - "YEAS_ITS=Working"
        commands:
          - echo $YEAS_ITS
      - name: Include/Exclude
        tests:
          - name: Just Include
            commands:
              - ./bin/smoke --no-color -l -i hello test/testdata/badtests.yml
              - ./bin/smoke --no-color -v -i hello test/testdata/badtests.yml
          - name: Just Exclude
            commands:
              - ./bin/smoke --no-color -l -x Head -x Tail test/testdata/badtests.yml
              - ./bin/smoke --no-color -v -x Head -x Tail test/testdata/badtests.yml
      - name: HTTP
        checks:
          - GET https://raw.githubusercontent.com/chakrit/smoke/master/LICENSE
        commands:
          - echo just the checks
      - name: Subtests
        commands:
          - echo "parent command"
        tests:
          - name: Command Inherits
            commands:
              - echo "child command"
            checks:
              - stdout
      - name: Usage
        commands:
          - ./bin/smoke --no-color --bogus-flag # bad flag must exit 64
      - name: CUE
        commands:
          - ./bin/smoke --no-color --list test/testdata/cuetests.cue # .cue spec loads
          - ./bin/smoke --no-color test/testdata/cuetests.cue # and compares UNCHANGED
      - name: JSON
        commands:
          - ./bin/smoke --no-color --list test/testdata/jsontests.json # .json spec loads
          - ./bin/smoke --no-color test/testdata/jsontests.json # and compares UNCHANGED
      - name: JSONL
        commands:
          - ./bin/smoke --no-color --list test/testdata/jsonltests.jsonl # .jsonl spec loads
          - ./bin/smoke --no-color test/testdata/jsonltests.jsonl # and compares UNCHANGED
      - name: JSON Output
        tests:
          - name: Unchanged
            commands:
              - ./bin/smoke --no-color --json test/testdata/stabletests.yml # status unchanged, exit 0
          - name: Changed
            commands:
              - ./bin/smoke --no-color --json test/testdata/badtests.yml # status changed, exit 1
          - name: New
            commands:
              - ./bin/smoke --no-color --json test/testdata/newtests.yml # status new, exit 3
          - name: Bad combo
            commands:
              - ./bin/smoke --no-color --json --list test/testdata/stabletests.yml # mode mix must exit 64
      - name: Init
        tests:
          - name: Writes named file
            commands:
              - rm -f test/testdata/init-scratch.yml && ./bin/smoke --no-color --init=test/testdata/init-scratch.yml && rm test/testdata/init-scratch.yml
          - name: No clobber
            commands:
              - ./bin/smoke --no-color --init=test/tests.yml
      - name: Exit states
        tests:
          - name: New
            commands:
              - ./bin/smoke --no-color test/testdata/newtests.yml
          - name: Unchanged
            commands:
              - ./bin/smoke --no-color test/testdata/stabletests.yml
          - name: Operational
            commands:
              - ./bin/smoke --no-color test/testdata/nonexistent.yml
          - name: Malformed
            commands:
              - ./bin/smoke --no-color test/testdata/malformedtests.yml # bad spec must exit 65
          - name: Bad leaf
            commands:
              - ./bin/smoke --no-color test/testdata/badleaftests.yml # command-less leaf must exit 65
          - name: Bad CUE
            commands:
              - ./bin/smoke --no-color test/testdata/badcuetests.cue # schema violation must exit 65
          - name: Timeout
            commands:
              - ./bin/smoke --no-color test/testdata/timeouttests.yml
