- name: test/testdata/jsonctests.jsonc \ Echo
  commands:
    - command: echo jsonc-driven // smoke test
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - jsonc-driven // smoke test
- name: test/testdata/jsonctests.jsonc \ Arithmetic
  commands:
    - command: echo $((6 * 7))
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - "42"
